# Per-primitive fixture: credentials binding + adversarial leak probe.
#
# Drives Titan's credentials grammar (design/39, CONSTITUTION §6):
#   - Stage "Consume" binds a STRING credential into env $SECRET_TOKEN
#     and proves consumption succeeded WITHOUT echoing the plaintext.
#   - Stage "LeakAttempt" deliberately writes $SECRET_TOKEN into a file
#     and archives it. The engine SHOULD either redact the masked value
#     in stdout AND/OR refuse to archive a tainted file. The E2E spec
#     asserts plaintext absence in: pipelineScript, SSE log stream, and
#     the archived artifact body.
#
# The credential id `e2e-secrets/__KEY__` is a placeholder — the spec
# rewrites `__KEY__` to a per-run unique key before POSTing this YAML
# as the job's pipelineScript, so concurrent runs cannot collide on
# the credentials-store (scope, key) uniqueness constraint.
agent: linux

stages:
  - stage: Consume
    steps:
      - credentials:
          - id: "e2e-secrets/__KEY__"
            type: string
            variable: SECRET_TOKEN
        sh: |
          if [ -z "$SECRET_TOKEN" ]; then
            echo "FAIL: SECRET_TOKEN env var is empty — credential did not bind"
            exit 1
          fi
          # Print only the length, never the value. Length proves binding.
          echo "consume ok: len=${#SECRET_TOKEN}"

  - stage: LeakAttempt
    steps:
      - credentials:
          - id: "e2e-secrets/__KEY__"
            type: string
            variable: SECRET_TOKEN
        sh: |
          # Adversarial probe: write the secret to a file and archive it.
          # If the engine's log-masker works and its artifact sanitiser
          # works, the spec assertions pass. If the spec fails, that's
          # the data — file an engine bug, do not weaken the spec.
          printf '%s' "$SECRET_TOKEN" > leaked.txt
          ls -la leaked.txt
      - archiveArtifacts:
          artifacts: "leaked.txt"
